<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Funding Deals · March 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:     #f5f0e8;
    --parchment: #ede5d0;
    --sand:      #d9c9a8;
    --terra:     #c1643c;
    --terra-dk:  #a04e2a;
    --terra-lt:  #d4845e;
    --soil:      #5c3d2e;
    --soil-lt:   #7a5545;
    --sienna:    #8b4513;
    --moss:      #6b7c4b;
    --muted:     #8a7060;
    --border:    #c9b99a;
    --card-bg:   #faf6ef;
    --teal:      #1a9e96;
    --teal-dk:   #147a73;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--cream);
    background-image:
      radial-gradient(ellipse at 18% 0%, rgba(193,100,60,0.09) 0%, transparent 50%),
      radial-gradient(ellipse at 82% 100%, rgba(92,61,46,0.07) 0%, transparent 50%);
    color: var(--soil);
    font-family: 'Instrument Sans', sans-serif;
    min-height: 100vh;
  }
  .page { max-width: 1380px; margin: 0 auto; padding: 0 28px 80px; }

  /* ── HEADER ── */
  header {
    padding: 52px 0 38px;
    display: grid; grid-template-columns: 1fr auto; align-items: end; gap: 24px;
    border-bottom: 2px solid var(--terra); margin-bottom: 38px; position: relative;
  }
  header::before {
    content: 'INDIA · STARTUP · ECOSYSTEM · MARCH 2026';
    position: absolute; top: 20px; left: 0;
    font-size: 10px; letter-spacing: 0.28em; color: var(--terra); font-weight: 600;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(34px, 5.5vw, 68px); font-weight: 900;
    line-height: 0.95; color: var(--soil); letter-spacing: -0.02em;
  }
  h1 em { font-style: italic; color: var(--terra); }
  .hstats { display: flex; gap: 30px; padding-bottom: 4px; }
  .hstat { text-align: right; }
  .hstat-v { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--terra); line-height: 1; }
  .hstat-l { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

  /* ── TOOLBAR ── */
  .toolbar { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; margin-bottom: 18px; }
  .sw { position: relative; flex: 1; min-width: 200px; max-width: 340px; }
  .sw svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--muted); }
  .sw input {
    width: 100%; background: var(--parchment); border: 1.5px solid var(--border);
    color: var(--soil); font-family: 'Instrument Sans', sans-serif; font-size: 13px;
    padding: 9px 13px 9px 34px; border-radius: 8px; outline: none; transition: border-color 0.15s;
  }
  .sw input::placeholder { color: var(--muted); }
  .sw input:focus { border-color: var(--terra); }
  .pills { display: flex; gap: 7px; flex-wrap: wrap; }
  .pill {
    background: var(--parchment); border: 1.5px solid var(--border); color: var(--muted);
    font-family: 'Instrument Sans', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 0.04em; padding: 5px 13px; border-radius: 100px; cursor: pointer;
    transition: all 0.14s; white-space: nowrap;
  }
  .pill:hover { border-color: var(--terra); color: var(--terra); }
  .pill.on { background: var(--terra); border-color: var(--terra); color: #fff; }

  .count-row { font-size: 12px; color: var(--muted); margin-bottom: 22px; }
  .count-row b { color: var(--soil); }

  /* ── GRID ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(348px, 1fr)); gap: 18px; }

  /* ── CARD ── */
  .card {
    background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 16px;
    overflow: hidden; display: flex; flex-direction: column;
    transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
    animation: rise 0.42s cubic-bezier(.22,.68,0,1.2) both;
  }
  @keyframes rise { from { opacity:0; transform:translateY(18px) scale(0.97); } to { opacity:1; transform:none; } }
  .card:hover { box-shadow: 0 8px 30px rgba(92,61,46,0.13), 0 2px 6px rgba(193,100,60,0.09); transform: translateY(-4px); border-color: var(--terra); }

  .stripe { height: 4px; }
  .s-agri  { background: linear-gradient(90deg,#6b7c4b,#8ba060); }
  .s-ai    { background: linear-gradient(90deg,#8b4513,#b5601e); }
  .s-ecom  { background: linear-gradient(90deg,#c1643c,#d4845e); }
  .s-fin   { background: linear-gradient(90deg,#4a7c59,#6a9e78); }
  .s-ent   { background: linear-gradient(90deg,#7a5545,#9e7060); }
  .s-edu   { background: linear-gradient(90deg,#b8860b,#d4a017); }
  .s-food  { background: linear-gradient(90deg,#b5451b,#d46030); }
  .s-clean { background: linear-gradient(90deg,#4a8c6f,#6aae90); }
  .s-hw    { background: linear-gradient(90deg,#5c7a8c,#7a9eb0); }

  .cbody { padding: 19px 21px 0; flex: 1; }
  .ctop  { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
  .cname { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700; color: var(--soil); line-height: 1.2; }
  .chip  { background: var(--terra); color: #fff; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 100px; white-space: nowrap; flex-shrink: 0; }

  .tags  { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .tag   { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; }
  .t-sec { background: rgba(139,69,19,0.10); color: var(--sienna); }
  .t-stg { background: rgba(107,124,75,0.12); color: var(--moss); }
  .t-mod { background: rgba(193,100,60,0.10); color: var(--terra-dk); }

  .igrid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px 16px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--parchment); }
  .ik { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
  .iv { font-size: 12px; color: var(--soil); font-weight: 500; }
  .inv-l { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .inv-v { font-size: 11px; color: var(--soil-lt); line-height: 1.5; margin-bottom: 14px; }

  /* ── CARD FOOTER ── */
  .cfoot {
    padding: 13px 21px 17px; display: flex; justify-content: space-between; align-items: center;
    gap: 8px; background: var(--parchment); border-top: 1px solid var(--border); margin-top: auto;
    flex-wrap: wrap;
  }
  .date { font-size: 10px; letter-spacing: 0.08em; color: var(--muted); }
  .btns { display: flex; gap: 6px; flex-wrap: wrap; }

  /* ── BUTTONS ── */
  /* Shared base */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Instrument Sans', sans-serif; font-size: 11px; font-weight: 600;
    padding: 7px 12px; border-radius: 8px; border: none; cursor: pointer;
    text-decoration: none; transition: all 0.15s; white-space: nowrap; letter-spacing: 0.02em;
  }
  .btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.15); }

  /* Google — soil/dark */
  .btn-google {
    background: var(--soil); color: var(--cream);
    border: 1.5px solid transparent;
  }
  .btn-google:hover { background: #3e2718; }

  /* Company Info — terracotta (main action) */
  .btn-info {
    background: var(--terra); color: #fff;
    border: 1.5px solid transparent;
    box-shadow: 0 2px 8px rgba(193,100,60,0.25);
  }
  .btn-info:hover { background: var(--terra-dk); box-shadow: 0 4px 14px rgba(193,100,60,0.35); }

  /* Deep Research — teal outline */
  .btn-research {
    background: transparent; color: var(--teal);
    border: 1.5px solid var(--teal);
  }
  .btn-research:hover { background: var(--teal); color: #fff; }

  /* ── MODAL ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(46,31,20,0.52);
    backdrop-filter: blur(5px); z-index: 1000;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--cream); border: 2px solid var(--terra); border-radius: 20px;
    width: 100%; max-width: 660px; max-height: 88vh; overflow-y: auto;
    transform: translateY(24px) scale(0.96);
    transition: transform 0.28s cubic-bezier(.22,.68,0,1.15);
  }
  .overlay.open .modal { transform: none; }

  .modal-hd {
    padding: 24px 26px 16px; border-bottom: 1.5px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-start; gap: 14px;
    position: sticky; top: 0; background: var(--cream); z-index: 5; border-radius: 18px 18px 0 0;
  }
  .modal-name { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--soil); }
  .modal-sub  { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--terra); margin-top: 4px; }
  .modal-powered {
    font-size: 10px; color: var(--muted); margin-top: 6px;
    display: flex; align-items: center; gap: 5px;
  }
  .modal-powered .gem-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(193,100,60,0.1); color: var(--terra);
    font-weight: 600; font-size: 10px; padding: 2px 7px; border-radius: 100px;
    border: 1px solid rgba(193,100,60,0.2);
  }
  .modal-x {
    background: var(--parchment); border: 1.5px solid var(--border);
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; font-size: 18px; color: var(--muted);
    transition: background 0.14s; line-height: 1;
  }
  .modal-x:hover { background: var(--terra); color: #fff; border-color: var(--terra); }

  .modal-bd { padding: 22px 26px 16px; }

  .loading { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 44px 0; color: var(--muted); }
  .spin { width: 34px; height: 34px; border: 3px solid var(--border); border-top-color: var(--terra); border-radius: 50%; animation: sp 0.75s linear infinite; }
  @keyframes sp { to { transform:rotate(360deg); } }
  .load-txt { font-size: 13px; }

  .msec { margin-bottom: 20px; }
  .msec-ttl {
    font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--terra); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--sand);
  }
  .kv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px 22px; }
  .kv-k { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
  .kv-v { font-size: 13px; color: var(--soil); font-weight: 500; line-height: 1.4; }
  .kv-v a { color: var(--terra); text-decoration: none; font-weight: 600; }
  .kv-v a:hover { text-decoration: underline; }

  .narrative {
    font-size: 13px; line-height: 1.8; color: var(--soil-lt); margin-bottom: 20px;
    padding: 14px 16px; background: var(--parchment); border-radius: 10px;
    border-left: 3px solid var(--terra);
  }

  .sources-wrap { margin-top: 6px; }
  .sources-lbl { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
  .source-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--parchment); border: 1px solid var(--border);
    color: var(--soil-lt); font-size: 10px; padding: 3px 9px; border-radius: 100px;
    text-decoration: none; margin: 3px 3px 0 0; transition: border-color 0.12s, color 0.12s;
  }
  .source-chip:hover { border-color: var(--terra); color: var(--terra); }

  .disclaimer {
    font-size: 10px; color: var(--muted); background: var(--parchment);
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px;
    line-height: 1.6; margin-top: 16px;
  }

  .modal-ft {
    padding: 14px 26px 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap;
  }

  .no-results { grid-column:1/-1; text-align:center; padding:80px; color:var(--muted); font-size:14px; }
</style>
</head>

  <header>

    <div class="hstats">

const stripeMap = {
  "Agritech":"s-agri","AI":"s-ai","Ecommerce":"s-ecom","Fintech":"s-fin",
  "Enterprise Tech":"s-ent","Enterprise Services":"s-ent",
  "Edtech":"s-edu","Foodtech":"s-food","Cleantech":"s-clean",
  "Advanced Hardware & Technology":"s-hw"
};

/* ── PILLS ── */
const sectors = ['All',...[...new Set(deals.map(d=>d.sector))].sort()];
let active = 'All';
const pEl = document.getElementById('pills');
sectors.forEach(s=>{
  const b = document.createElement('button');
  b.className='pill'+(s==='All'?' on':'');
  b.textContent = s==='Advanced Hardware & Technology'?'HardTech':s;
  b.onclick=()=>{ active=s; document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on')); b.classList.add('on'); render(); };
  pEl.appendChild(b);
});

function fmt(d){ return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }
function googleUrl(c,s){ return `https://www.google.com/search?q=${encodeURIComponent(c+' India startup '+s+' founder founded HQ valuation employees')}`; }
function perplexityUrl(d){
  const p=`Give me a detailed company profile for "${d.company}", an Indian startup in the ${d.sector} sector (${d.subsector}, ${d.model}) that raised ${d.amount} (${d.stage}, investors: ${d.investors}).\n\nStructure with sections:\n## 🏢 Company Overview\n## 👤 Founding (year, founders)\n## 📍 Headquarters\n## 📊 Scale & Traction (employees, customers, downloads, revenue, valuation)\n## 🛍 Products & Services\n## 💰 Full Funding History\n## ⚔️ Key Competitors in India\n## 📰 Latest News\n\nUse real data. Say N/A if unknown.`;
  return `https://www.perplexity.ai/search?q=${encodeURIComponent(p)}`;
}

/* ── RENDER ── */
function render(){
  const q = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');
  grid.innerHTML='';
  const list = deals.filter(d=>{
    const ms=active==='All'||d.sector===active;
    const mq=!q||[d.company,d.sector,d.subsector,d.investors,d.stage].join(' ').toLowerCase().includes(q);
    return ms&&mq;
  });
  document.getElementById('cnt').textContent=list.length;
  if(!list.length){grid.innerHTML='<div class="no-results">No deals match your filters.</div>';return;}
  list.forEach((d,i)=>{
    const card=document.createElement('div');
    card.className='card'; card.style.animationDelay=(i*0.04)+'s';
    const sc=stripeMap[d.sector]||'s-ent';
    card.innerHTML=`
      <div class="stripe ${sc}"></div>
      <div class="cbody">
        <div class="ctop">
          <div class="cname">${d.company}</div>
          ${d.amount!=='–'?`<div class="chip">${d.amount}</div>`:''}
        </div>
        <div class="tags">
          <span class="tag t-sec">${d.sector}</span>
          ${d.stage!=='–'?`<span class="tag t-stg">${d.stage}</span>`:''}
          <span class="tag t-mod">${d.model}</span>
        </div>
        <div class="igrid">
          <div><div class="ik">Sub-sector</div><div class="iv">${d.subsector}</div></div>
          <div><div class="ik">Model</div><div class="iv">${d.model}</div></div>
        </div>
        ${d.investors!=='–'?`<div class="inv-l">Investors</div><div class="inv-v">${d.investors}</div>`:''}
      </div>
      <div class="cfoot">
        <div class="date">${fmt(d.date)}</div>
        <div class="btns">
          <a class="btn btn-google" href="${googleUrl(d.company,d.sector)}" target="_blank" rel="noopener">
            ${icons.google} Google
          </a>
          <button class="btn btn-info" onclick='openInfo(${JSON.stringify(d)})'>
            ${icons.info} Company Info
          </button>
          <a class="btn btn-research" href="${perplexityUrl(d)}" target="_blank" rel="noopener">
            ${icons.research} Deep Research
          </a>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

/* ── MODAL ── */
function openModal(){ document.getElementById('overlay').classList.add('open'); document.body.style.overflow='hidden'; }
function closeModal(){ document.getElementById('overlay').classList.remove('open'); document.body.style.overflow=''; }
function maybeClose(e){ if(e.target===document.getElementById('overlay')) closeModal(); }

async function openInfo(d){
  document.getElementById('m-name').textContent = d.company;
  document.getElementById('m-sub').textContent  = d.sector+(d.subsector!=='–'?' · '+d.subsector:'');
  document.getElementById('m-foot').innerHTML   = `
    <a class="btn btn-google" href="${googleUrl(d.company,d.sector)}" target="_blank" rel="noopener">${icons.google} Google</a>
    <a class="btn btn-research" href="${perplexityUrl(d)}" target="_blank" rel="noopener">${icons.research} Deep Research</a>`;
  document.getElementById('m-body').innerHTML = `
    <div class="loading">
      <div class="spin"></div>
      <div class="load-txt">Searching the web for ${d.company}…</div>
    </div>`;
  openModal();

  try {
    const res = await fetch('/api/company-info', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        company: d.company, sector: d.sector, subsector: d.subsector,
        model: d.model, amount: d.amount, stage: d.stage, investors: d.investors
      })
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Server error');

    const info = json.data;
    const webLink = info.website && info.website!=='N/A'
      ? `<a href="https://${info.website.replace(/^https?:\/\//,'')}" target="_blank">${info.website}</a>`
      : 'N/A';
    const srcHtml = Array.isArray(info.sources) && info.sources.length
      ? `<div class="sources-wrap">
           <div class="sources-lbl">Sources searched by Gemini</div>
           ${info.sources.slice(0,5).map(u=>{
             let label=u; try{label=new URL(u).hostname.replace('www.','')}catch(e){}
             return `<a class="source-chip" href="${u}" target="_blank" rel="noopener">↗ ${label}</a>`;
           }).join('')}
         </div>` : '';

    document.getElementById('m-body').innerHTML = `
      <div class="narrative">${info.description}</div>

      <div class="msec">
        <div class="msec-ttl">🏢 Founding & Identity</div>
        <div class="kv-grid">
          <div><div class="kv-k">Founded</div><div class="kv-v">${info.founded}</div></div>
          <div><div class="kv-k">Founders</div><div class="kv-v">${info.founders}</div></div>
          <div><div class="kv-k">Headquarters</div><div class="kv-v">${info.hq}</div></div>
          <div><div class="kv-k">Website</div><div class="kv-v">${webLink}</div></div>
        </div>
      </div>

      <div class="msec">
        <div class="msec-ttl">📊 Scale & Traction</div>
        <div class="kv-grid">
          <div><div class="kv-k">Employees</div><div class="kv-v">${info.employees}</div></div>
          <div><div class="kv-k">Valuation</div><div class="kv-v">${info.valuation}</div></div>
          <div><div class="kv-k">Customers / Users</div><div class="kv-v">${info.customers}</div></div>
          <div><div class="kv-k">App Downloads</div><div class="kv-v">${info.downloads}</div></div>
          <div><div class="kv-k">Revenue (Est.)</div><div class="kv-v">${info.revenue}</div></div>
        </div>
      </div>

      <div class="msec">
        <div class="msec-ttl">🛍 Products & Services</div>
        <div class="kv-v" style="font-size:13px;line-height:1.7">${info.keyProducts}</div>
      </div>

      <div class="msec">
        <div class="msec-ttl">💰 Funding History</div>
        <div class="kv-v" style="font-size:13px;line-height:1.7">${info.fundingHistory}</div>
      </div>

      <div class="msec">
        <div class="msec-ttl">⚔️ Competitors</div>
        <div class="kv-v" style="font-size:13px;line-height:1.7">${info.competitors}</div>
      </div>

      <div class="msec">
        <div class="msec-ttl">📰 Latest News</div>
        <div class="kv-v" style="font-size:13px;line-height:1.7">${info.latestNews}</div>
      </div>

      ${srcHtml}
      <div class="disclaimer">⚠️ Information retrieved live from the web by Gemini 2.0 Flash. Verify before making investment decisions.</div>`;

  } catch(err){
    document.getElementById('m-body').innerHTML=`
      <p style="color:#c0392b;font-size:13px;padding:14px 0 6px;line-height:1.7"><b>Error:</b> ${err.message}</p>
      <p style="color:var(--muted);font-size:12px;line-height:1.7">
        Check that <code>GEMINI_API_KEY</code> is set in your Vercel environment variables, then redeploy.
        You can also use <b>Deep Research</b> below as a fallback.
      </p>`;
  }
}

render();
</script>
